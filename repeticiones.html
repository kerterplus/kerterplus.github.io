<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Repeticiones</title>
    <style>
        /* ESTILO IOS 16 - MODO OSCURO */
        :root {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --input-bg: #2C2C2E;
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
            --text-main: #FFFFFF;
            --text-sec: #EBEBF5;
            --border-rad: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            padding-bottom: 100px;
        }

        header {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-buttons { display: flex; gap: 10px; }

        button {
            border: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.96); }

        .btn-primary { background: var(--ios-blue); color: white; padding: 8px 16px; }
        .btn-copy { background: #32D74B; color: black; padding: 8px 16px; font-weight: 700; }
        .btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--ios-red); padding: 8px 16px; }
        .btn-edit { background: rgba(10, 132, 255, 0.15); color: var(--ios-blue); padding: 8px 16px; }

        /* CONTENEDOR TIPO GRID (CUADRÍCULA AUTOMÁTICA) */
        .container { 
            padding: 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
            display: grid;
            /* Aquí ocurre la magia: si hay espacio caben 3 o 4, si es celular cabe 1 */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-rad);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Para que la imagen respete los bordes curvos */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card img {
            width: 100%;
            aspect-ratio: 16/9; /* Formato panorámico de video */
            object-fit: cover;
            background: #2C2C2E;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-info { 
            padding: 16px; 
            flex: 1; 
        }
        
        .card-info h3 { margin: 0 0 6px 0; font-size: 17px; font-weight: 600; line-height: 1.3; }
        .card-info p { margin: 4px 0; font-size: 14px; color: rgba(235, 235, 245, 0.6); }
        .card-info .league { 
            display: inline-block; 
            background: var(--input-bg); 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--ios-blue); 
            margin-top: 8px;
        }

        .card-actions {
            padding: 0 16px 16px 16px;
            display: flex;
            gap: 10px;
        }
        
        .card-actions button { flex: 1; padding: 10px; } /* Los botones ocupan 50% cada uno */

        /* Modal Styles Oscuro */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 1000;
            opacity: 0; transition: opacity 0.3s;
        }
        
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            background: var(--card-bg);
            width: 100%; max-width: 600px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; font-size: 20px; }
        .btn-close { background: var(--input-bg); color: var(--text-sec); border-radius: 50%; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; font-size: 20px; padding: 0; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: rgba(235, 235, 245, 0.6); margin-bottom: 6px; font-weight: 500; }
        .form-group input { 
            width: 100%; box-sizing: border-box;
            background: var(--input-bg); border: 1px solid rgba(255,255,255,0.05); padding: 14px;
            border-radius: 12px; font-size: 16px; color: var(--text-main); font-family: inherit;
        }
        .form-group input:focus { outline: 2px solid var(--ios-blue); border-color: transparent; }

        .modal-footer { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
        .modal-footer button { width: 100%; padding: 14px; font-size: 17px; }
        .btn-cancel { background: var(--input-bg); color: var(--text-main); }

        #loading { text-align: center; color: var(--text-sec); padding: 40px; font-size: 16px; grid-column: 1 / -1; }

        .fab {
            position: fixed; bottom: 24px; right: 24px;
            width: 60px; height: 60px; border-radius: 30px;
            background: var(--ios-blue); color: white;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.5);
            z-index: 90; cursor: pointer; border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Repeticiones</h1>
        <div class="header-buttons">
            <button class="btn-copy" onclick="copyJSON()">Copiar Código JSON</button>
            <button class="btn-primary" onclick="openModal()">+ Nuevo</button>
        </div>
    </header>

    <div class="container" id="app">
        <div id="loading">Cargando datos desde GitHub...</div>
    </div>

    <!-- Botón flotante para móviles -->
    <button class="fab" onclick="openModal()">+</button>

    <!-- Modal Formulario -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Partido</h2>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>Título del Partido</label>
                <input type="text" id="inputTitle" placeholder="Ej: Barcelona vs. Elche">
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="text" id="inputFecha" placeholder="Ej: 2/11/2025">
            </div>
            <div class="form-group">
                <label>Liga / Torneo</label>
                <input type="text" id="inputLeague" placeholder="Ej: La Liga">
            </div>
            <div class="form-group">
                <label>URL de la Imagen (Portada)</label>
                <input type="url" id="inputImg" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>URL del Video (OK.ru, etc)</label>
                <input type="url" id="inputUrl" placeholder="https://ok.ru/...">
            </div>

            <div class="modal-footer">
                <button class="btn-primary" onclick="saveItem()">Guardar Partido</button>
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // URL de tu JSON alojado en GitHub Pages
        const JSON_URL = 'https://kerterplus.github.io/repeticiones.json';
        
        let matches =[];
        let editingIndex = -1;

        // Cargar los datos al iniciar
        async function loadData() {
            try {
                const response = await fetch(`${JSON_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Error en la red");
                matches = await response.json();
                renderList();
            } catch (error) {
                console.error("Error cargando JSON:", error);
                document.getElementById('loading').innerHTML = "No se pudo cargar el JSON. Puedes empezar a agregar partidos nuevos.";
                renderList();
            }
        }

        // Mostrar las tarjetas en la cuadrícula
        function renderList() {
            const container = document.getElementById('app');
            container.innerHTML = '';

            if (matches.length === 0) {
                container.innerHTML = '<div id="loading">No hay partidos registrados o hubo un error al cargar. Añade uno nuevo.</div>';
                return;
            }

            matches.forEach((match, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${match.img}" alt="Miniatura" onerror="this.src='https://via.placeholder.com/600x337/2C2C2E/8E8E93?text=Sin+Imagen'">
                    <div class="card-info">
                        <h3>${match.title}</h3>
                        <p>📅 ${match.fecha}</p>
                        <span class="league">🏆 ${match.league}</span>
                    </div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="openModal(${index})">Editar</button>
                        <button class="btn-danger" onclick="deleteItem(${index})">Borrar</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Abrir Modal
        function openModal(index = -1) {
            editingIndex = index;
            const titleEl = document.getElementById('modalTitle');

            if (index > -1) {
                titleEl.innerText = "Editar Partido";
                const match = matches[index];
                document.getElementById('inputTitle').value = match.title;
                document.getElementById('inputFecha').value = match.fecha;
                document.getElementById('inputLeague').value = match.league;
                document.getElementById('inputImg').value = match.img;
                document.getElementById('inputUrl').value = match.url;
            } else {
                titleEl.innerText = "Nuevo Partido";
                document.getElementById('inputTitle').value = '';
                document.getElementById('inputFecha').value = '';
                document.getElementById('inputLeague').value = '';
                document.getElementById('inputImg').value = '';
                document.getElementById('inputUrl').value = '';
            }

            const modal = document.getElementById('modalOverlay');
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('active');
        }

        function saveItem() {
            const title = document.getElementById('inputTitle').value.trim();
            const fecha = document.getElementById('inputFecha').value.trim();
            const league = document.getElementById('inputLeague').value.trim();
            const img = document.getElementById('inputImg').value.trim();
            const url = document.getElementById('inputUrl').value.trim();

            if(!title || !url) {
                alert("Por favor, pon al menos el Título y la URL del video.");
                return;
            }

            const newMatch = { title, fecha, league, img, url };

            if (editingIndex > -1) {
                matches[editingIndex] = newMatch;
            } else {
                matches.unshift(newMatch);
            }

            closeModal();
            renderList();
        }

        function deleteItem(index) {
            if (confirm("¿Estás seguro de que deseas eliminar esta repetición?")) {
                matches.splice(index, 1);
                renderList();
            }
        }

        function copyJSON() {
            const jsonText = JSON.stringify(matches, null, 2);
            navigator.clipboard.writeText(jsonText).then(() => {
                alert("✅ ¡CÓDIGO COPIADO CON ÉXITO!\n\nVe a tu repositorio de GitHub, edita el archivo 'repeticiones.json', borra todo lo que tiene, pega lo que acabas de copiar y dale a Commit changes.");
            }).catch(err => {
                alert("No se pudo copiar automáticamente. Da los permisos o copia esto:\n\n" + jsonText);
            });
        }

        // Iniciar App
        loadData();
    </script>
</body>
</html>
